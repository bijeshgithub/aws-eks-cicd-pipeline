apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: devops-app
  template:
    metadata: 
     labels:
      app: devops-app
    spec:
     containers: 
     - name: devops-container
       image: 906482382692.dkr.ecr.eu-north-1.amazonaws.com/devops-eks-app
       ports:
       - containerPort: 80
       
       
    
     
